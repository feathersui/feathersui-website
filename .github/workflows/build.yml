name: Build

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: feathersui-website
          path: _site/
